<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detector Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f6f9; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        textarea { width: 100%; height: 100px; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        #system_response { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI-Based Emotion Detector</h1>
        <p>Type a sentence below to analyze its underlying emotional content:</p>
        <textarea id="textToAnalyze" placeholder="How are you feeling today?..."></textarea>
        <button onclick="runAnalysis()">Analyze Sentiment</button>
        <div id="system_response"></div>
    </div>

    <script>
        function runAnalysis() {
            var text = document.getElementById("textToAnalyze").value;
            var responseDiv = document.getElementById("system_response");
            
            // Send request to our Python Flask Backend server
            fetch('/emotionDetector?textToAnalyze=' + encodeURIComponent(text))
                .then(response => response.json())
                .then(data => {
                    responseDiv.style.display = "block";
                    responseDiv.innerText = data.message;
                    
                    // Style response box dynamically based on success or error (Task 7 UI check)
                    if (data.status === "error") {
                        responseDiv.className = "error";
                    } else {
                        responseDiv.className = "success";
                    }
                });
        }
    </script>
</body>
</html>
